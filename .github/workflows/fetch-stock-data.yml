name: Fetch Stock Data

on:
  schedule:
    - cron: '30 6 * * 1-5' # 14:30 UTC+8, weekdays only (after market close)
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch TWSE STOCK_DAY_ALL
        continue-on-error: true
        run: |
          curl -f --retry 3 --retry-delay 10 \
            'https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL' \
            -H 'accept: application/json' \
            -o data/STOCK_DAY_ALL.json

      - name: Fetch TPEx mainboard quotes
        continue-on-error: true
        run: |
          curl -f --retry 3 --retry-delay 10 \
            'https://www.tpex.org.tw/openapi/v1/tpex_mainboard_quotes' \
            -H 'accept: application/json' \
            -o data/tpex_mainboard_quotes.json

      - name: Fetch TPEx ESB latest statistics
        continue-on-error: true
        run: |
          curl -f --retry 3 --retry-delay 10 \
            'https://www.tpex.org.tw/openapi/v1/tpex_esb_latest_statistics' \
            -H 'accept: application/json' \
            -o data/tpex_esb_latest_statistics.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/STOCK_DAY_ALL.json data/tpex_mainboard_quotes.json data/tpex_esb_latest_statistics.json
          git diff --cached --quiet || git commit -m "data: update stock data $(TZ='Asia/Taipei' date +'%Y-%m-%d')"
          git push
