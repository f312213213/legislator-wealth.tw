name: Fetch Stock Data

on:
  schedule:
    - cron: '30 6 * * 1-5' # 14:30 UTC+8, weekdays only (after market close)
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch stock price data
        run: pnpm run fetch-stock-prices

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/STOCK_DAY_ALL.json data/tpex_mainboard_quotes.json data/tpex_esb_latest_statistics.json
          git diff --cached --quiet || git commit -m "data: update stock data $(TZ='Asia/Taipei' date +'%Y-%m-%d')"
          git push
